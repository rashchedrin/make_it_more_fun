<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Cosmic Dodge</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #0a0a12;
      font-family: 'Segoe UI', system-ui, sans-serif;
      color: #e0e0e0;
    }
    h1 {
      font-size: 1.75rem;
      margin-bottom: 0.5rem;
      letter-spacing: 0.15em;
      color: #7dd3fc;
    }
    .subtitle {
      font-size: 0.85rem;
      opacity: 0.8;
      margin-bottom: 1rem;
    }
    #gameContainer {
      position: relative;
      border: 2px solid #334155;
      border-radius: 8px;
      overflow: hidden;
      box-shadow: 0 0 40px rgba(125, 211, 252, 0.15);
    }
    #gameCanvas {
      display: block;
      background: radial-gradient(ellipse at 50% 100%, #1e293b 0%, #0f172a 50%, #020617 100%);
      cursor: none;
    }
    .hud {
      display: flex;
      justify-content: space-between;
      width: 100%;
      max-width: 600px;
      padding: 0.5rem 0;
      font-size: 0.9rem;
    }
    .hud span { color: #94a3b8; }
    .hud strong { color: hsl(210, 40%, 98%); }
    #startScreen, #gameOverScreen {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: rgba(2, 6, 23, 0.92);
      gap: 1rem;
    }
    #gameOverScreen { display: none; }
    #startScreen p, #gameOverScreen p {
      font-size: 0.95rem;
      max-width: 320px;
      text-align: center;
      line-height: 1.5;
      color: #94a3b8;
    }
    .btn {
      padding: 0.6rem 1.5rem;
      font-size: 1rem;
      border: none;
      border-radius: 6px;
      background: #0ea5e9;
      color: #fff;
      cursor: pointer;
      font-weight: 600;
      letter-spacing: 0.05em;
    }
    .btn:hover { background: #38bdf8; }
    .btn:focus { outline: 2px solid #7dd3fc; outline-offset: 2px; }
    #finalScore { font-size: 1.5rem; color: #7dd3fc; }
  </style>
</head>
<body>
  <h1>COSMIC DODGE</h1>
  <p class="subtitle">Shoot or dodge. Beat your high score.</p>
  <div id="gameContainer">
    <canvas id="gameCanvas" width="600" height="400" tabindex="0"></canvas>
    <div id="startScreen">
      <p><strong>Arrow Left/Right</strong> or <strong>A/D</strong> move. <strong>Space</strong> shoots.<br>Destroy asteroids for bonus points. Survive and beat your high score.</p>
      <button class="btn" id="startBtn">Start Game</button>
    </div>
    <div id="gameOverScreen">
      <p>Game Over</p>
      <p id="finalScore">Score: 0</p>
      <p id="newRecordEl" style="display:none; color: #7dd3fc; font-weight: 600;">New record!</p>
      <button class="btn" id="restartBtn">Play Again</button>
    </div>
  </div>
  <div class="hud">
    <span>Score: <strong id="scoreEl">0</strong></span>
    <span>Best: <strong id="bestEl">0</strong></span>
    <span>Lives: <strong id="livesEl">3</strong></span>
  </div>

  <script>
    (function () {
      'use strict';

      const canvas = document.getElementById('gameCanvas');
      const ctx = canvas.getContext('2d');
      const startScreen = document.getElementById('startScreen');
      const gameOverScreen = document.getElementById('gameOverScreen');
      const startBtn = document.getElementById('startBtn');
      const restartBtn = document.getElementById('restartBtn');
      const scoreEl = document.getElementById('scoreEl');
      const livesEl = document.getElementById('livesEl');
      const bestEl = document.getElementById('bestEl');
      const finalScoreEl = document.getElementById('finalScore');
      const newRecordEl = document.getElementById('newRecordEl');

      const HIGH_SCORE_KEY = 'cosmic_dodge_high_score';
      const PLAYER_WIDTH = 40;
      const PLAYER_HEIGHT = 24;
      const PLAYER_SPEED = 5;
      const BULLET_SPEED = -11;
      const BULLET_COOLDOWN_MS = 180;
      const ASTEROID_MIN_R = 12;
      const ASTEROID_MAX_R = 28;
      const ASTEROID_SPEED_BASE = 1.2;
      const SPAWN_INTERVAL_MS_INITIAL = 1400;
      const SPAWN_INTERVAL_MS_MIN = 550;
      const INITIAL_LIVES = 3;
      const BONUS_POINTS_PER_ASTEROID = 15;
      const SHAKE_STRENGTH = 8;
      const SHAKE_DECAY = 0.85;
      const PARTICLE_COUNT_DESTROY = 8;

      let gameState = 'start'; // 'start' | 'playing' | 'gameover'
      let playerX = 0;
      let lastTime = 0;
      let spawnAccum = 0;
      let asteroids = [];
      let bullets = [];
      let particles = [];
      let score = 0;
      let lives = INITIAL_LIVES;
      let animationId = null;
      let gameTimeMs = 0;
      let bulletCooldownRemaining = 0;
      let shakeX = 0;
      let shakeY = 0;
      let highScore = 0;
      let audioCtx = null;

      function loadHighScore() {
        try {
          const stored = localStorage.getItem(HIGH_SCORE_KEY);
          if (stored !== null) {
            const parsed = parseInt(stored, 10);
            if (Number.isFinite(parsed) && parsed >= 0) highScore = parsed;
          }
        } catch (_) {}
        bestEl.textContent = String(highScore);
      }
      function saveHighScore() {
        if (score <= highScore) return;
        highScore = score;
        bestEl.textContent = String(highScore);
        try {
          localStorage.setItem(HIGH_SCORE_KEY, String(highScore));
        } catch (_) {}
      }
      function ensureAudio() {
        if (audioCtx !== null) return;
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      }
      function playTone(frequencyHz, durationMs, type) {
        if (audioCtx === null) return;
        const oscillator = audioCtx.createOscillator();
        const gainNode = audioCtx.createGain();
        oscillator.connect(gainNode);
        gainNode.connect(audioCtx.destination);
        oscillator.frequency.value = frequencyHz;
        oscillator.type = type || 'square';
        gainNode.gain.setValueAtTime(0.08, audioCtx.currentTime);
        gainNode.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + durationMs / 1000);
        oscillator.start(audioCtx.currentTime);
        oscillator.stop(audioCtx.currentTime + durationMs / 1000);
      }
      function spawnParticles(centerX, centerY, count) {
        for (let n = 0; n < count; n++) {
          const angle = (Math.PI * 2 * n) / count + Math.random() * 0.5;
          const speed = 1.5 + Math.random() * 2;
          particles.push({
            x: centerX,
            y: centerY,
            vx: Math.cos(angle) * speed,
            vy: Math.sin(angle) * speed,
            life: 1,
            maxLife: 0.4 + Math.random() * 0.2
          });
        }
      }

      function clamp(value, minVal, maxVal) {
        return Math.max(minVal, Math.min(maxVal, value));
      }

      function initGame() {
        playerX = canvas.width / 2 - PLAYER_WIDTH / 2;
        asteroids = [];
        bullets = [];
        particles = [];
        score = 0;
        lives = INITIAL_LIVES;
        spawnAccum = 0;
        gameTimeMs = 0;
        bulletCooldownRemaining = 0;
        shakeX = 0;
        shakeY = 0;
        gameState = 'playing';
        startScreen.style.display = 'none';
        gameOverScreen.style.display = 'none';
        newRecordEl.style.display = 'none';
        scoreEl.textContent = '0';
        livesEl.textContent = String(INITIAL_LIVES);
        bestEl.textContent = String(highScore);
      }

      function spawnAsteroid() {
        const radius = ASTEROID_MIN_R + Math.random() * (ASTEROID_MAX_R - ASTEROID_MIN_R);
        const x = radius + Math.random() * (canvas.width - 2 * radius);
        const speed = ASTEROID_SPEED_BASE + Math.random() * 0.8;
        asteroids.push({ x, y: -radius, radius, speed });
      }

      function rectCircleCollide(rectX, rectY, rectW, rectH, circleX, circleY, circleR) {
        const closestX = clamp(circleX, rectX, rectX + rectW);
        const closestY = clamp(circleY, rectY, rectY + rectH);
        const dx = circleX - closestX;
        const dy = circleY - closestY;
        return dx * dx + dy * dy <= circleR * circleR;
      }
      function circleCircleCollide(x1, y1, r1, x2, y2, r2) {
        const dx = x2 - x1;
        const dy = y2 - y1;
        return dx * dx + dy * dy <= (r1 + r2) * (r1 + r2);
      }

      function update(deltaMs) {
        if (gameState !== 'playing') return;

        const deltaSec = deltaMs / 1000;
        const move = { left: false, right: false };
        if (keysDown['ArrowLeft'] || keysDown['a'] || keysDown['A']) move.left = true;
        if (keysDown['ArrowRight'] || keysDown['d'] || keysDown['D']) move.right = true;
        if (move.left) playerX -= PLAYER_SPEED;
        if (move.right) playerX += PLAYER_SPEED;
        playerX = clamp(playerX, 0, canvas.width - PLAYER_WIDTH);

        if (bulletCooldownRemaining > 0) bulletCooldownRemaining -= deltaMs;
        if ((keysDown[' '] || keysDown['Space']) && bulletCooldownRemaining <= 0) {
          bulletCooldownRemaining = BULLET_COOLDOWN_MS;
          const playerY = canvas.height - PLAYER_HEIGHT - 20;
          bullets.push({
            x: playerX + PLAYER_WIDTH / 2,
            y: playerY,
            vy: BULLET_SPEED
          });
          playTone(880, 40, 'square');
        }

        for (let i = bullets.length - 1; i >= 0; i--) {
          const bullet = bullets[i];
          bullet.y += bullet.vy * (deltaMs / 16);
          if (bullet.y < -6) {
            bullets.splice(i, 1);
            continue;
          }
          for (let j = asteroids.length - 1; j >= 0; j--) {
            const ast = asteroids[j];
            if (circleCircleCollide(bullet.x, bullet.y, 3, ast.x, ast.y, ast.radius)) {
              const points = BONUS_POINTS_PER_ASTEROID + Math.floor(ast.radius);
              score += points;
              spawnParticles(ast.x, ast.y, PARTICLE_COUNT_DESTROY);
              asteroids.splice(j, 1);
              bullets.splice(i, 1);
              playTone(440, 50, 'square');
              break;
            }
          }
        }

        gameTimeMs += deltaMs;
        const spawnInterval = Math.max(SPAWN_INTERVAL_MS_MIN,
          SPAWN_INTERVAL_MS_INITIAL - gameTimeMs * 0.04);
        spawnAccum += deltaMs;
        while (spawnAccum >= spawnInterval) {
          spawnAsteroid();
          spawnAccum -= spawnInterval;
        }

        const playerY = canvas.height - PLAYER_HEIGHT - 20;
        for (let i = asteroids.length - 1; i >= 0; i--) {
          const ast = asteroids[i];
          ast.y += ast.speed;
          if (ast.y - ast.radius > canvas.height) {
            asteroids.splice(i, 1);
            score += 10;
            spawnParticles(ast.x, canvas.height + ast.radius, 4);
            continue;
          }
          if (rectCircleCollide(playerX, playerY, PLAYER_WIDTH, PLAYER_HEIGHT, ast.x, ast.y, ast.radius)) {
            asteroids.splice(i, 1);
            lives--;
            livesEl.textContent = String(lives);
            shakeX = SHAKE_STRENGTH * (Math.random() * 2 - 1);
            shakeY = SHAKE_STRENGTH * (Math.random() * 2 - 1);
            spawnParticles(ast.x, ast.y, PARTICLE_COUNT_DESTROY);
            playTone(180, 120, 'sawtooth');
            if (lives <= 0) {
              gameState = 'gameover';
              const wasNewRecord = score > highScore;
              saveHighScore();
              finalScoreEl.textContent = 'Score: ' + score;
              if (wasNewRecord) newRecordEl.style.display = 'block';
              gameOverScreen.style.display = 'flex';
            }
          }
        }

        for (let i = particles.length - 1; i >= 0; i--) {
          const p = particles[i];
          p.x += p.vx * (deltaMs / 16);
          p.y += p.vy * (deltaMs / 16);
          p.life -= deltaSec / p.maxLife;
          if (p.life <= 0) particles.splice(i, 1);
        }
        shakeX *= SHAKE_DECAY;
        shakeY *= SHAKE_DECAY;

        score += Math.floor(deltaSec * 5);
        scoreEl.textContent = String(score);
      }

      function draw() {
        ctx.save();
        ctx.translate(shakeX, shakeY);
        ctx.fillStyle = '#0f172a';
        ctx.fillRect(-10, -10, canvas.width + 20, canvas.height + 20);

        const playerY = canvas.height - PLAYER_HEIGHT - 20;
        ctx.fillStyle = '#38bdf8';
        ctx.beginPath();
        ctx.moveTo(playerX + PLAYER_WIDTH / 2, playerY);
        ctx.lineTo(playerX + PLAYER_WIDTH, playerY + PLAYER_HEIGHT);
        ctx.lineTo(playerX + PLAYER_WIDTH / 2, playerY + PLAYER_HEIGHT - 4);
        ctx.lineTo(playerX, playerY + PLAYER_HEIGHT);
        ctx.closePath();
        ctx.fill();
        ctx.strokeStyle = '#7dd3fc';
        ctx.lineWidth = 1;
        ctx.stroke();

        ctx.fillStyle = '#fbbf24';
        for (let i = 0; i < bullets.length; i++) {
          const bullet = bullets[i];
          ctx.beginPath();
          ctx.arc(bullet.x, bullet.y, 3, 0, Math.PI * 2);
          ctx.fill();
        }

        ctx.fillStyle = '#64748b';
        for (let i = 0; i < asteroids.length; i++) {
          const ast = asteroids[i];
          ctx.beginPath();
          ctx.arc(ast.x, ast.y, ast.radius, 0, Math.PI * 2);
          ctx.fill();
          ctx.strokeStyle = '#475569';
          ctx.lineWidth = 2;
          ctx.stroke();
        }

        for (let i = 0; i < particles.length; i++) {
          const p = particles[i];
          const alpha = Math.max(0, p.life);
          ctx.fillStyle = 'rgba(251, 191, 36, ' + alpha + ')';
          ctx.beginPath();
          ctx.arc(p.x, p.y, 3, 0, Math.PI * 2);
          ctx.fill();
        }
        ctx.restore();
      }

      const keysDown = {};
      function onKeyDown(event) {
        keysDown[event.key] = true;
        if (event.key === ' ' || event.key === 'Space') event.preventDefault();
        if (gameState === 'start' && (event.key === ' ' || event.key === 'Enter')) {
          startBtn.click();
        }
        if (gameState === 'gameover' && (event.key === ' ' || event.key === 'Enter')) {
          restartBtn.click();
        }
      }
      function onKeyUp(event) {
        keysDown[event.key] = false;
      }

      function gameLoop(timestamp) {
        const deltaMs = lastTime ? timestamp - lastTime : 16;
        lastTime = timestamp;
        update(deltaMs);
        draw();
        animationId = requestAnimationFrame(gameLoop);
      }

      function startGame() {
        ensureAudio();
        initGame();
        lastTime = 0;
        if (animationId !== null) cancelAnimationFrame(animationId);
        animationId = requestAnimationFrame(gameLoop);
      }

      startBtn.addEventListener('click', startGame);
      restartBtn.addEventListener('click', startGame);

      canvas.setAttribute('tabindex', '0');
      canvas.focus();
      loadHighScore();
      document.addEventListener('keydown', onKeyDown);
      document.addEventListener('keyup', onKeyUp);
      canvas.addEventListener('click', function () {
        if (gameState === 'start') startBtn.click();
      });
    })();
  </script>
</body>
</html>
